name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  # Native amd64 (AVX2 + SSE, dispatch + Force kernels) and native arm64. On
  # arm64 the stable toolchain has no go1.27 integer-multiply mnemonics, so the
  # encode kernel built here is the shift-and-mask path (encode_arm64.go, gated
  # arm64 && !go1.27); the go1.27 VUMULL multiply kernel is covered by the
  # gotip job below. The gate enforces 100% Go-statement coverage on each.
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: go vet ./...
      - run: go test -v ./...
      - run: go test -run '^$' -fuzz FuzzEncode -fuzztime 15s ./...
      - run: go test -run '^$' -fuzz FuzzDecode -fuzztime 15s ./...
      - name: coverage gate (100%)
        run: |
          go test -covermode=atomic -coverprofile=cov.out ./...
          pct=$(go tool cover -func=cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }

  # The arm64 go1.27 encode kernel uses the integer VUMULL / VUMULL2 / VMUL the
  # Go arm64 assembler only gained upstream in Go 1.27, so it builds under
  # //go:build arm64 && go1.27 (encode_arm64_go127.go / .s). Exercise it on the
  # gotip (1.27-devel) toolchain on native arm64, fuzz it against the stdlib, and
  # gate it at 100% — this is the only job that compiles and covers that kernel.
  test-arm64-go1_27:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: go install golang.org/dl/gotip@latest && gotip download
      - run: gotip version
      - run: gotip vet ./...
      - run: gotip test -v ./...
      - run: gotip test -run '^$' -fuzz FuzzEncode -fuzztime 15s ./...
      - name: coverage gate (100%, VUMULL kernel)
        run: |
          gotip test -covermode=atomic -coverprofile=cov.out ./...
          pct=$(gotip tool cover -func=cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }

  # Emulated arches under QEMU. ppc64le (VSX) and s390x (vector facility) each
  # have a real SIMD encode AND decode kernel; riscv64 exercises the !amd64 &&
  # !arm64 && !ppc64le && !s390x generic fallback (encode_generic.go +
  # decode_generic.go) so no generic-only statement is left unmeasured. qemu cpu
  # models copied from go-simd/matchlen's green job (power9 for ppc64le, the
  # default "qemu" for s390x — NOT z14, which is fatal under TCG).
  emulated:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: riscv64, image: "debian:trixie", qemu: "rv64,v=true,vlen=128" }
          - { arch: ppc64le, image: "debian:trixie", qemu: "power9" }
          - { arch: s390x,   image: "debian:trixie", qemu: "qemu" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: docker run --privileged --rm tonistiigi/binfmt --install ${{ matrix.arch }}
      - name: build cover test binary
        run: GOOS=linux GOARCH=${{ matrix.arch }} go test -covermode=atomic -coverpkg=./... -c -o /tmp/cov.test .
      - name: run under qemu and gate (100%)
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} \
            -e QEMU_CPU=${{ matrix.qemu }} \
            -v /tmp:/t ${{ matrix.image }} \
            /t/cov.test -test.v -test.coverprofile=/t/cov.out
          go tool cover -func=/tmp/cov.out
          pct=$(go tool cover -func=/tmp/cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }

  # The ppc64le/s390x kernels are validated by the `emulated` jobs above (table +
  # exhaustive differential + fuzz-seed-corpus tests run from the cross-compiled
  # binary under QEMU) and fuzzed natively on amd64/arm64 (the `test` job). Running
  # the -fuzz engine itself inside QEMU-TCG (needs an in-container toolchain + module
  # download) is flaky on CI — a transient dep-download/TCG hiccup, not a kernel bug
  # (verified: the exact step passes locally at 5M+ execs/arch). So it is not run here.
